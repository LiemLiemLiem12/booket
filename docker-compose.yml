services:
  postgres:
    image: postgres:16-alpine
    container_name: booket-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-booket}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-booket}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - booket-network

  redis:
    image: redis:8.6.3-alpine
    container_name: booket-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password} --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - booket-network

networks:
  booket-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
